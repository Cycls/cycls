<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bun on cycls</title>
<style>
  :root {
    --bg:#fafaf9; --surface:#fff; --border:#e7e5e4; --muted:#78716c;
    --fg:#1c1917; --accent:#fbf0df; --accent-fg:#16161e;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#0c0a09; --surface:#171413; --border:#27241f; --muted:#a8a29e;
            --fg:#f5f5f4; --accent:#fbf0df; --accent-fg:#16161e; }
  }
  * { box-sizing: border-box; }
  body {
    font: 15px/1.55 -apple-system,system-ui,"Segoe UI",sans-serif;
    background: var(--bg); color: var(--fg);
    max-width: 640px; margin: 2.5em auto; padding: 0 1.25em;
  }
  h1 { font-weight: 300; font-size: 1.75em; letter-spacing: -0.02em; margin: 0; }
  h1 .accent { background: var(--accent); color: var(--accent-fg);
               padding: 0 0.3em; border-radius: 4px; font-weight: 500; }
  .head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 1.5em; }
  .who { color: var(--muted); font-size: 0.85em; font-family: ui-monospace, monospace; }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.25em; margin-bottom: 1em;
  }
  .card h2 { font-size: 0.78em; text-transform: uppercase; letter-spacing: 0.06em;
             color: var(--muted); margin: 0 0 0.6em; font-weight: 500; }
  pre, code { font-family: ui-monospace, "SF Mono", Menlo, monospace;
              font-size: 0.85em; }
  pre { background: var(--bg); border: 1px solid var(--border);
        padding: 0.75em; border-radius: 6px; overflow-x: auto; margin: 0; }
  input, button {
    font: inherit; padding: 0.55em 0.8em; border: 1px solid var(--border);
    border-radius: 8px; background: var(--surface); color: var(--fg);
  }
  input { width: 100%; }
  input:focus { outline: none; border-color: var(--fg); }
  button { cursor: pointer; }
  button:hover { opacity: 0.8; }
  button.primary { background: var(--fg); color: var(--bg); border-color: var(--fg); }
  button.ghost { background: transparent; border: none; color: var(--muted); padding: 0.3em 0.5em; font-size: 0.85em; }
  .row { display: flex; gap: 0.5em; }
  .row > input { flex: 1; }
  .note { padding: 0.6em 0; border-bottom: 1px solid var(--border); }
  .note:last-child { border: none; }
  .meta { color: var(--muted); font-size: 0.75em; margin-top: 0.2em; }
  .empty { color: var(--muted); text-align: center; padding: 1em 0; font-size: 0.85em; }
  .stat { display: flex; justify-content: space-between; padding: 0.3em 0; font-size: 0.9em; }
  .stat span:last-child { color: var(--muted); font-family: ui-monospace, monospace; }
</style>
</head>
<body>
<div id="app">Loading…</div>

<script async crossorigin="anonymous"
  src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
  data-clerk-publishable-key="__CLERK_PK__">
</script>

<script>
const el = (tag, props = {}, ...kids) => {
  const e = Object.assign(document.createElement(tag), props);
  kids.flat().forEach(k => k != null && e.append(k));
  return e;
};

async function api(method, path, body) {
  const t = await Clerk.session.getToken();
  const headers = { Authorization: "Bearer " + t };
  if (body !== undefined) {
    headers["Content-Type"] = "application/json";
  }
  const res = await fetch("/api" + path, {
    method, headers, body: body && JSON.stringify(body),
  });
  if (!res.ok) throw new Error(method + " " + path + " → " + res.status);
  return res.status === 204 ? null : res.json();
}

async function render() {
  const root = document.getElementById("app");
  root.innerHTML = "";

  const info = await api("GET", "/info");

  root.append(
    el("div", { className: "head" },
      el("h1", {}, "Hello from ", el("span", { className: "accent" }, "Bun")),
      el("button", { className: "ghost", onclick: () => Clerk.signOut().then(boot) }, "sign out"),
    ),
    el("div", { className: "card" },
      el("h2", {}, "runtime"),
      el("div", { className: "stat" }, el("span", {}, "engine"),  el("span", {}, info.runtime + " " + info.version)),
      el("div", { className: "stat" }, el("span", {}, "platform"), el("span", {}, info.platform + "/" + info.arch)),
      el("div", { className: "stat" }, el("span", {}, "pid"),      el("span", {}, info.pid)),
    ),
  );

  // Notes panel — hits Bun's /notes endpoint, which writes to the per-tenant
  // workspace stamped on the request by the Python proxy.
  const noteInput = el("input", { placeholder: "write a note…" });
  const list = el("div");

  async function refresh() {
    const notes = await api("GET", "/notes");
    list.innerHTML = "";
    if (!notes.length) { list.append(el("div", { className: "empty" }, "no notes yet")); return; }
    notes.sort((a, b) => b.at.localeCompare(a.at));
    for (const n of notes) {
      list.append(el("div", { className: "note" },
        el("div", {}, n.text || "(empty)"),
        el("div", { className: "meta" }, new Date(n.at).toLocaleString()),
      ));
    }
  }
  async function add() {
    const text = noteInput.value.trim();
    if (!text) return;
    await api("POST", "/notes", { text });
    noteInput.value = "";
    await refresh();
  }
  noteInput.addEventListener("keydown", e => { if (e.key === "Enter") add(); });

  const benchOut = el("pre", {}, "click to benchmark");
  const benchBtn = el("button", { className: "primary",
    style: "width: 100%; margin-top: 0.5em;",
    onclick: async () => {
      benchOut.textContent = "running…";
      const r = await api("GET", "/bench");
      benchOut.textContent = JSON.stringify(r, null, 2);
    },
  }, "run /bench");

  root.append(
    el("div", { className: "card" },
      el("h2", {}, "per-tenant notes (Bun writes /workspace/notes.json)"),
      el("div", { className: "row", style: "margin-bottom: 0.6em;" },
        noteInput,
        el("button", { className: "primary", onclick: add }, "add"),
      ),
      list,
    ),
    el("div", { className: "card" },
      el("h2", {}, "v8 micro-benchmark"),
      benchOut,
      benchBtn,
    ),
  );
  await refresh();
}

async function boot() {
  await Clerk.load();
  if (!Clerk.user) {
    const root = document.getElementById("app");
    root.innerHTML = "";
    Clerk.mountSignIn(root);
    return;
  }
  await render();
}

window.addEventListener("load", () => {
  const wait = setInterval(() => {
    if (window.Clerk) { clearInterval(wait); boot(); }
  }, 50);
});
</script>
</body>
</html>
